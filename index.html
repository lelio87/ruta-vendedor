<!DOCTYPE html>
<html>
<head>
  <title>Mapa de visitas</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }

    .filtro {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<div class="filtro">
  <label><b>Filtrar por vendedor:</b></label><br>
  <select id="filtroVendedor">
    <option value="todos">Todos</option>
  </select>
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([-32.8895, -68.8458], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let markers = [];
let dataGlobal = [];

// 🎨 Colores disponibles
const colores = ["red", "blue", "green", "orange", "violet", "yellow"];
const coloresVendedores = {};

// Icono personalizado
function crearIcono(color) {
  return new L.Icon({
    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
    shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
  });
}

// 👇 TU URL DEL WEB APP
fetch("TU_URL_WEB_APP")
  .then(res => res.json())
  .then(data => {

    dataGlobal = data;

    const vendedores = [...new Set(data.map(p => p.vendedor))];

    // Asignar colores automáticamente
    vendedores.forEach((v, index) => {
      coloresVendedores[v] = colores[index % colores.length];
    });

    // Cargar dropdown
    const select = document.getElementById("filtroVendedor");

    vendedores.forEach(v => {
      const option = document.createElement("option");
      option.value = v;
      option.textContent = v;
      select.appendChild(option);
    });

    mostrarMarkers(data);

  });

// Mostrar markers
function mostrarMarkers(data) {

  // Limpiar mapa
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const bounds = [];

  data.forEach(p => {

    const color = coloresVendedores[p.vendedor] || "blue";
    const icono = crearIcono(color);

    const marker = L.marker([p.lat, p.lng], { icon: icono }).addTo(map);

    marker.bindPopup(`
      <b>${p.comercio}</b><br>
      ${p.nombre}<br>
      📍 ${p.direccion}<br>
      📱 ${p.celular}<br>
      👤 ${p.vendedor}
    `);

    markers.push(marker);
    bounds.push([p.lat, p.lng]);
  });

  // 🔍 Zoom automático
  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [50, 50] });
  }
}

// Evento filtro
document.getElementById("filtroVendedor").addEventListener("change", function() {

  const vendedorSeleccionado = this.value;

  if (vendedorSeleccionado === "todos") {
    mostrarMarkers(dataGlobal);
  } else {
    const filtrados = dataGlobal.filter(p => p.vendedor === vendedorSeleccionado);
    mostrarMarkers(filtrados);
  }

});

</script>

</body>
</html>
