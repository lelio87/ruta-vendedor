<!DOCTYPE html>
<html>
<head>
  <title>Mapa de visitas</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family:Arial; }

    .topbar {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      z-index:1000;
      background:white;
      padding:8px 12px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.2);
    }

    #map { height:100vh; }
  </style>
</head>
<body>

<div class="topbar">
  <select id="filtroVendedor">
    <option value="todos">Todos</option>
  </select>
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([-32.8895,-68.8458],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];
let dataGlobal = [];

const colores = ["red","blue","green","orange","violet"];
const coloresVendedores = {};

function crearIcono(color){
  return new L.Icon({
    iconUrl:`https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
    shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
  });
}

// 🔁 PEGAR TU URL
fetch("https://script.google.com/macros/s/AKfycbwNzFtV6BDxWDIkxAm5QDhDzzDkLlU5nLW4mwUQkRUarr6a-I2nPLouw7SpPs08q-io/exec")
.then(res=>res.json())
.then(data=>{

  dataGlobal = data;

  const vendedores = [...new Set(data.map(p=>p.vendedor))];

  vendedores.forEach((v,i)=>{
    coloresVendedores[v] = colores[i % colores.length];
  });

  const select = document.getElementById("filtroVendedor");

  vendedores.forEach(v=>{
    const option = document.createElement("option");
    option.value = v;
    option.textContent = v;
    select.appendChild(option);
  });

  mostrarMarkers(data);
});

function mostrarMarkers(data){

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  const bounds=[];

  data.forEach(p=>{

    const icono = crearIcono(coloresVendedores[p.vendedor] || "blue");

    const marker = L.marker([p.lat,p.lng],{icon:icono}).addTo(map);

    marker.bindPopup(`
      <b>Nombre del cliente:</b> ${p.nombre}<br>
      <b>Dirección:</b> ${p.direccion}, Mendoza, Argentina<br>
      <b>Comercio:</b> ${p.comercio}<br>
      <b>Contacto:</b> ${p.celular}<br>
      <b>Vendedor:</b> ${p.vendedor}
    `);

    markers.push(marker);
    bounds.push([p.lat,p.lng]);
  });

  if(bounds.length>0){
    map.fitBounds(bounds,{padding:[40,40]});
  }
}

document.getElementById("filtroVendedor").addEventListener("change",function(){

  const v = this.value;

  if(v==="todos"){
    mostrarMarkers(dataGlobal);
  }else{
    mostrarMarkers(dataGlobal.filter(p=>p.vendedor===v));
  }

});

</script>
</body>
</html>
